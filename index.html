<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💋 iOS kisses everywhere · CHUDOGI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      width: 100vw;
      background: radial-gradient(circle at 30% 20%, #1a0d1a, #0f0015 40%, #000 70%);
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      color: #fff;
      cursor: none;
    }

    /* custom cursor – stays subtle */
    .cursor {
      position: fixed;
      width: 28px;
      height: 28px;
      border: 2px solid #ff2e63;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: all 0.08s ease-out;
      mix-blend-mode: difference;
    }

    .cursor-follower {
      position: fixed;
      width: 12px;
      height: 12px;
      background: #ff2e63;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: all 0.12s ease-out;
      box-shadow: 0 0 15px #ff2e63aa;
    }

    .container {
      position: relative;
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* main text – big & bold */
    .main-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 14vw, 22rem);
      font-weight: 900;
      color: transparent;
      background: linear-gradient(90deg, #ff2e63, #ff6b9d, #ff2e63, #c71585);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      animation: gradientFlow 5s ease infinite, pulseText 2.4s ease-in-out infinite alternate;
      text-shadow: 0 0 60px rgba(255,46,99,0.7);
      letter-spacing: -0.04em;
      z-index: 10;
      user-select: none;
      white-space: nowrap;
      max-width: 100vw;
      overflow: hidden;
      text-overflow: clip;
      padding: 0 2vw;
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes pulseText {
      from { transform: scale(1); }
      to   { transform: scale(1.04); }
    }

    /* ---------- KISS (iOS 💋 emoji) animation ---------- */
    .kiss {
      position: fixed;
      pointer-events: none;
      user-select: none;
      z-index: 6;
      transform-origin: center center;
      animation: kissFloat 2.4s ease-out forwards;
      filter: drop-shadow(0 0 12px rgba(255, 46, 99, 0.9));
    }

    .kiss img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      transform: rotate(var(--rot));
    }

    @keyframes kissFloat {
      0% {
        opacity: 0;
        transform: scale(0.2) translateY(0);
      }
      15% {
        opacity: 1;
        transform: scale(1.2) translateY(-8px);
      }
      30% {
        opacity: 0.95;
        transform: scale(1) translateY(0);
      }
      70% {
        opacity: 0.7;
        transform: scale(1) translateY(0);
      }
      100% {
        opacity: 0;
        transform: scale(0.6) translateY(24px);
      }
    }

    /* glowing rings in background */
    .glow-ring {
      position: absolute;
      width: min(600px, 80vw);
      height: min(600px, 80vw);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,46,99,0.12) 0%, transparent 70%);
      pointer-events: none;
      animation: breathe 14s ease-in-out infinite;
      z-index: 3;
    }

    @keyframes breathe {
      0%,100% { transform: scale(0.8); opacity: 0.4; }
      50%     { transform: scale(1.4); opacity: 0.7; }
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 30%, transparent 30%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
      z-index: 8;
    }

    /* background video – very faint dreamy layer */
    .bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100vw;
      min-height: 100vh;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
      opacity: 0.15;
      z-index: 1;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .video-tint {
      position: fixed;
      inset: 0;
      background: rgba(10, 0, 20, 0.6);
      z-index: 2;
      pointer-events: none;
    }
  </style>
</head>
<body>

<!-- background video (moody) -->
<video class="bg-video" id="bgVid" muted loop playsinline disablePictureInPicture controlsList="nodownload nofullscreen noremoteplayback">
  <source src="https://files.catbox.moe/ntaibt.mp4" type="video/mp4">
</video>
<div class="video-tint"></div>

<!-- custom cursor -->
<div class="cursor"></div>
<div class="cursor-follower"></div>

<div class="container">
  <div class="glow-ring" style="top:30%; left:60%;"></div>
  <div class="glow-ring" style="top:65%; left:25%; animation-delay: -7s;"></div>

  <h1 class="main-text">CHUDOGI</h1>   <!-- pure text, no emoji here -->

  <div class="overlay"></div>
</div>

<script>
  (function() {
    // ---------- CURSOR ----------
    const cursor = document.querySelector('.cursor');
    const follower = document.querySelector('.cursor-follower');

    document.addEventListener('mousemove', (e) => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';

      setTimeout(() => {
        follower.style.left = e.clientX + 'px';
        follower.style.top = e.clientY + 'px';
      }, 40);
    });

    document.addEventListener('mousedown', () => {
      cursor.style.transform = 'translate(-50%,-50%) scale(1.8)';
    });
    document.addEventListener('mouseup', () => {
      cursor.style.transform = 'translate(-50%,-50%) scale(1)';
    });

    // ---------- VIDEO AUTOPLAY ----------
    const vid = document.getElementById('bgVid');
    vid.play().catch(() => {
      const playOnce = () => {
        vid.play();
        document.removeEventListener('click', playOnce);
        document.removeEventListener('touchstart', playOnce);
      };
      document.addEventListener('click', playOnce);
      document.addEventListener('touchstart', playOnce);
    });

    // block right-click & long press on video
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    vid.addEventListener('contextmenu', (e) => e.preventDefault());
    document.addEventListener('touchstart', (e) => {
      if (e.target.tagName === 'VIDEO') e.preventDefault();
    }, { passive: false });

    // ---------- KISS SPAWNER – iOS 18 style 💋 emoji image (Apple) ----------
    // use high‑res Apple emoji from emoji‑datasource (iOS 14+ style, closest to iOS 18)
    // this ensures Android also sees the iOS design
    const KISS_IMAGE_SRC = 'https://cdn.jsdelivr.net/npm/emoji-datasource-apple@14.0.0/img/apple/128/1f48b.png';
    // fallback image in case the CDN fails (still apple style from another source)
    const FALLBACK_SRC = 'https://emoji.aranja.com/ios/18.0/1f48b.png?128x128'; // might have iOS 18

    function spawnKiss() {
      const el = document.createElement('div');
      el.classList.add('kiss');

      const size  = 70 + Math.random() * 100;        // 70–170px
      const rot   = (Math.random() * 50 - 25) + 'deg'; // -25° to 25°
      const x     = Math.random() * (window.innerWidth - size);
      const y     = Math.random() * (window.innerHeight - size * 0.7); // avoid edges

      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.width = size + 'px';
      el.style.setProperty('--rot', rot);

      // create image with iOS emoji
      const img = document.createElement('img');
      img.src = https://files.catbox.moe/cfzwte.png;
      img.alt = '';
      img.style.transform = `rotate(${rot})`; // rotate inside container
      // if primary fails, try fallback
      img.onerror = () => {
        img.src = FALLBACK_SRC;
        // if fallback also fails, hide? but we keep it, maybe show a simple heart? nah.
        img.onerror = null; // prevent infinite loop
      };

      el.appendChild(img);
      document.body.appendChild(el);

      // remove after animation ends
      el.addEventListener('animationend', () => el.remove());
    }

    // ---- continuous random loop ----
    function startKissRain() {
      spawnKiss();
      setTimeout(startKissRain, 400 + Math.random() * 900); // between 400ms and 1300ms
    }

    // spawn a few kisses instantly
    for (let i = 0; i < 8; i++) {
      setTimeout(spawnKiss, i * 150);
    }

    startKissRain();

    // extra kisses on click – makes it more playful
    document.addEventListener('click', (e) => {
      for (let i = 0; i < 2 + Math.floor(Math.random() * 3); i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.classList.add('kiss');
          const size = 60 + Math.random() * 90;
          const rot = (Math.random() * 40 - 20) + 'deg';
          const x = e.clientX - size/2 + (Math.random()*80 - 40);
          const y = e.clientY - size/2 + (Math.random()*80 - 40);
          el.style.left = x + 'px';
          el.style.top = y + 'px';
          el.style.width = size + 'px';
          el.style.setProperty('--rot', rot);
          const img = document.createElement('img');
          img.src = KISS_IMAGE_SRC;
          img.alt = '💋';
          img.style.transform = `rotate(${rot})`;
          img.onerror = () => { img.src = FALLBACK_SRC; img.onerror = null; };
          el.appendChild(img);
          document.body.appendChild(el);
          el.addEventListener('animationend', () => el.remove());
        }, i * 70);
      }
    });
  })();
</script>
</body>
</html>
