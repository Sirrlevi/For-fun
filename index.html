<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CHUDOGI 😈</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@600;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle at 30% 20%, #1a0d1a, #0f0015 40%, #000 70%);
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      color: #fff;
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      position: fixed;
      width: 28px;
      height: 28px;
      border: 2px solid #ff2e63;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: all 0.08s ease-out;
      mix-blend-mode: difference;
    }

    .cursor-follower {
      position: fixed;
      width: 12px;
      height: 12px;
      background: #ff2e63;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: all 0.12s ease-out;
      box-shadow: 0 0 15px #ff2e63aa;
    }

    .container {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .main-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(6rem, 16vw, 22rem);
      font-weight: 900;
      color: transparent;
      background: linear-gradient(90deg, #ff2e63, #ff6b9d, #ff2e63, #c71585);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      animation: gradientFlow 5s ease infinite, pulseText 2.4s ease-in-out infinite alternate;
      text-shadow: 0 0 60px rgba(255,46,99,0.7);
      letter-spacing: -0.04em;
      z-index: 10;
      user-select: none;
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes pulseText {
      from { transform: scale(1); }
      to   { transform: scale(1.06); }
    }

    /* Sexy Indian vibe floating elements */
    .sticker {
      position: absolute;
      font-size: 4.5rem;
      opacity: 0.15;
      pointer-events: none;
      user-select: none;
      animation: float 18s infinite ease-in-out, rotateSlow 40s linear infinite;
      z-index: 5;
    }

    .sticker.fast {
      animation-duration: 12s, 25s;
      opacity: 0.25;
    }

    .sticker:nth-child(odd)  { color: #ff2e63; }
    .sticker:nth-child(even) { color: #ff69b4; }

    @keyframes float {
      0%,100% { transform: translateY(0) rotate(0deg); }
      25%     { transform: translateY(-120px) rotate(8deg); }
      50%     { transform: translateY(0) rotate(0deg); }
      75%     { transform: translateY(140px) rotate(-10deg); }
    }

    @keyframes rotateSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .glow-ring {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,46,99,0.12) 0%, transparent 70%);
      pointer-events: none;
      animation: breathe 14s ease-in-out infinite;
      z-index: 3;
    }

    @keyframes breathe {
      0%,100% { transform: scale(0.8); opacity: 0.4; }
      50%     { transform: scale(1.4); opacity: 0.7; }
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 30%, transparent 30%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
      z-index: 8;
    }
  </style>
</head>
<body>

<div class="cursor"></div>
<div class="cursor-follower"></div>

<div class="container">
  <div class="glow-ring" style="top:30%; left:60%;"></div>
  <div class="glow-ring" style="top:65%; left:25%; animation-delay: -7s;"></div>

  <h1 class="main-text">CHUDOGI</h1>

  <div class="overlay"></div>

  <!-- Floating spicy indian-ish emojis / stickers -->
  <div class="sticker" style="top:15%; left:8%;">🥵</div>
  <div class="sticker fast" style="top:22%; right:12%;">🔥</div>
  <div class="sticker" style="bottom:18%; left:18%;">😈</div>
  <div class="sticker fast" style="bottom:25%; right:15%;">💦</div>
  <div class="sticker" style="top:40%; left:5%;">🪔</div>
  <div class="sticker" style="top:55%; right:8%; animation-delay:3s;">🍑</div>
  <div class="sticker fast" style="bottom:12%; left:22%;">👅</div>
  <div class="sticker" style="top:8%; right:20%; animation-delay:6s;">🌶️</div>
  <div class="sticker" style="bottom:35%; left:10%;">😏</div>
</div>

<script>
  const cursor = document.querySelector('.cursor');
  const follower = document.querySelector('.cursor-follower');

  document.addEventListener('mousemove', (e) => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';

    setTimeout(() => {
      follower.style.left = e.clientX + 'px';
      follower.style.top  = e.clientY + 'px';
    }, 60);
  });

  // slight scale on click
  document.addEventListener('mousedown', () => {
    cursor.style.transform = 'translate(-50%,-50%) scale(1.8)';
  });
  document.addEventListener('mouseup', () => {
    cursor.style.transform = 'translate(-50%,-50%) scale(1)';
  });
</script>

</body>
</html>
