<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CHUDOGI 😈</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@600;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      width: 100vw;
      background: radial-gradient(circle at 30% 20%, #1a0d1a, #0f0015 40%, #000 70%);
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      color: #fff;
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      position: fixed;
      width: 28px;
      height: 28px;
      border: 2px solid #ff2e63;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: all 0.08s ease-out;
      mix-blend-mode: difference;
    }

    .cursor-follower {
      position: fixed;
      width: 12px;
      height: 12px;
      background: #ff2e63;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: all 0.12s ease-out;
      box-shadow: 0 0 15px #ff2e63aa;
    }

    .container {
      position: relative;
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .main-text {
      font-family: 'Playfair Display', serif;
      /* FIX: use vw-based sizing so text stays inside screen on all devices */
      font-size: clamp(3rem, 14vw, 22rem);
      font-weight: 900;
      color: transparent;
      background: linear-gradient(90deg, #ff2e63, #ff6b9d, #ff2e63, #c71585);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      animation: gradientFlow 5s ease infinite, pulseText 2.4s ease-in-out infinite alternate;
      text-shadow: 0 0 60px rgba(255,46,99,0.7);
      letter-spacing: -0.04em;
      z-index: 10;
      user-select: none;
      /* FIX: prevent overflow */
      white-space: nowrap;
      max-width: 100vw;
      overflow: hidden;
      text-overflow: clip;
      padding: 0 2vw;
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes pulseText {
      from { transform: scale(1); }
      to   { transform: scale(1.04); }
    }

    /* Kiss mark animation */
    .kiss {
      position: fixed;
      pointer-events: none;
      user-select: none;
      z-index: 6;
      transform-origin: center center;
      animation: kissAnim 2.8s ease-out forwards;
    }

    @keyframes kissAnim {
      0%   { opacity: 0; transform: scale(0.2) rotate(var(--rot)); }
      15%  { opacity: 1; transform: scale(1.2) rotate(var(--rot)); }
      30%  { opacity: 0.85; transform: scale(1) rotate(var(--rot)); }
      70%  { opacity: 0.6; transform: scale(1) rotate(var(--rot)); }
      100% { opacity: 0; transform: scale(0.8) rotate(var(--rot)); }
    }
    .glow-ring {
      position: absolute;
      width: min(600px, 80vw);
      height: min(600px, 80vw);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,46,99,0.12) 0%, transparent 70%);
      pointer-events: none;
      animation: breathe 14s ease-in-out infinite;
      z-index: 3;
    }

    @keyframes breathe {
      0%,100% { transform: scale(0.8); opacity: 0.4; }
      50%     { transform: scale(1.4); opacity: 0.7; }
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 30%, transparent 30%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
      z-index: 8;
    }

    /* Background video */
    .bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100vw;
      min-height: 100vh;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
      opacity: 0.18;
      z-index: 1;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    /* Dark tint over video */
    .video-tint {
      position: fixed;
      inset: 0;
      background: rgba(10, 0, 20, 0.55);
      z-index: 2;
      pointer-events: none;
    }
  </style>
</head>
<body>

<!-- Background Video -->
<video class="bg-video" id="bgVid" muted loop playsinline disablePictureInPicture controlsList="nodownload nofullscreen noremoteplayback">
  <source src="https://files.catbox.moe/ntaibt.mp4" type="video/mp4">
</video>
<div class="video-tint"></div>

<div class="cursor"></div>
<div class="cursor-follower"></div>

<div class="container">
  <div class="glow-ring" style="top:30%; left:60%;"></div>
  <div class="glow-ring" style="top:65%; left:25%; animation-delay: -7s;"></div>

  <h1 class="main-text">CHUDOGI</h1>

  <div class="overlay"></div>
</div>

<script>
  const cursor = document.querySelector('.cursor');
  const follower = document.querySelector('.cursor-follower');
  const vid = document.getElementById('bgVid');

  // Force autoplay (muted = allowed by all browsers)
  vid.play().catch(() => {
    document.addEventListener('click', () => vid.play(), { once: true });
    document.addEventListener('touchstart', () => vid.play(), { once: true });
  });

  // Block right-click — prevents "Save video as"
  document.addEventListener('contextmenu', (e) => e.preventDefault());

  // Block long press on mobile video
  vid.addEventListener('contextmenu', (e) => e.preventDefault());
  document.addEventListener('touchstart', (e) => {
    if (e.target.tagName === 'VIDEO') e.preventDefault();
  }, { passive: false });

  document.addEventListener('mousemove', (e) => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';

    setTimeout(() => {
      follower.style.left = e.clientX + 'px';
      follower.style.top  = e.clientY + 'px';
    }, 60);
  });

  document.addEventListener('mousedown', () => {
    cursor.style.transform = 'translate(-50%,-50%) scale(1.8)';
  });
  document.addEventListener('mouseup', () => {
    cursor.style.transform = 'translate(-50%,-50%) scale(1)';
  });
</script>

</body>
</html>
