<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>kisses everywhere · CHUDOGI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      width: 100vw;
      background: radial-gradient(circle at 30% 20%, #1a0d1a, #0f0015 40%, #000 70%);
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      color: #fff;
      cursor: none;
    }

    /* custom cursor – stays subtle, kisses are the stars */
    .cursor {
      position: fixed;
      width: 28px;
      height: 28px;
      border: 2px solid #ff2e63;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: all 0.08s ease-out;
      mix-blend-mode: difference;
    }

    .cursor-follower {
      position: fixed;
      width: 12px;
      height: 12px;
      background: #ff2e63;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: all 0.12s ease-out;
      box-shadow: 0 0 15px #ff2e63aa;
    }

    .container {
      position: relative;
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* main text – big & bold */
    .main-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 14vw, 22rem);
      font-weight: 900;
      color: transparent;
      background: linear-gradient(90deg, #ff2e63, #ff6b9d, #ff2e63, #c71585);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      animation: gradientFlow 5s ease infinite, pulseText 2.4s ease-in-out infinite alternate;
      text-shadow: 0 0 60px rgba(255,46,99,0.7);
      letter-spacing: -0.04em;
      z-index: 10;
      user-select: none;
      white-space: nowrap;
      max-width: 100vw;
      overflow: hidden;
      text-overflow: clip;
      padding: 0 2vw;
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes pulseText {
      from { transform: scale(1); }
      to   { transform: scale(1.04); }
    }

    /* ---------- KISS (lip mark) animation ---------- */
    .kiss {
      position: fixed;
      pointer-events: none;
      user-select: none;
      z-index: 6;
      transform-origin: center center;
      animation: kissFloat 2.4s ease-out forwards;
      filter: drop-shadow(0 0 8px rgba(255, 46, 99, 0.8));
    }

    @keyframes kissFloat {
      0% {
        opacity: 0;
        transform: scale(0.2) rotate(var(--rot)) translateY(0);
      }
      15% {
        opacity: 1;
        transform: scale(1.2) rotate(var(--rot)) translateY(-6px);
      }
      30% {
        opacity: 0.95;
        transform: scale(1) rotate(var(--rot)) translateY(0);
      }
      70% {
        opacity: 0.7;
        transform: scale(1) rotate(var(--rot)) translateY(0);
      }
      100% {
        opacity: 0;
        transform: scale(0.7) rotate(var(--rot)) translateY(20px);
      }
    }

    /* glowing rings in background */
    .glow-ring {
      position: absolute;
      width: min(600px, 80vw);
      height: min(600px, 80vw);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,46,99,0.12) 0%, transparent 70%);
      pointer-events: none;
      animation: breathe 14s ease-in-out infinite;
      z-index: 3;
    }

    @keyframes breathe {
      0%,100% { transform: scale(0.8); opacity: 0.4; }
      50%     { transform: scale(1.4); opacity: 0.7; }
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 30%, transparent 30%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
      z-index: 8;
    }

    /* background video – very faint dreamy layer */
    .bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100vw;
      min-height: 100vh;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
      opacity: 0.15;
      z-index: 1;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .video-tint {
      position: fixed;
      inset: 0;
      background: rgba(10, 0, 20, 0.6);
      z-index: 2;
      pointer-events: none;
    }
  </style>
</head>
<body>

<!-- background video (moody) -->
<video class="bg-video" id="bgVid" muted loop playsinline disablePictureInPicture controlsList="nodownload nofullscreen noremoteplayback">
  <source src="https://files.catbox.moe/ntaibt.mp4" type="video/mp4">
</video>
<div class="video-tint"></div>

<!-- custom cursor -->
<div class="cursor"></div>
<div class="cursor-follower"></div>

<div class="container">
  <div class="glow-ring" style="top:30%; left:60%;"></div>
  <div class="glow-ring" style="top:65%; left:25%; animation-delay: -7s;"></div>

  <h1 class="main-text">CHUDOGI</h1>   <!-- no emoji here, only pure text -->

  <div class="overlay"></div>
</div>

<script>
  (function() {
    // ---------- CURSOR ----------
    const cursor = document.querySelector('.cursor');
    const follower = document.querySelector('.cursor-follower');

    document.addEventListener('mousemove', (e) => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';

      setTimeout(() => {
        follower.style.left = e.clientX + 'px';
        follower.style.top = e.clientY + 'px';
      }, 40); // slight delay for smoother trail
    });

    document.addEventListener('mousedown', () => {
      cursor.style.transform = 'translate(-50%,-50%) scale(1.8)';
    });
    document.addEventListener('mouseup', () => {
      cursor.style.transform = 'translate(-50%,-50%) scale(1)';
    });

    // ---------- VIDEO AUTOPLAY ----------
    const vid = document.getElementById('bgVid');
    vid.play().catch(() => {
      // if autoplay blocked, play on first interaction
      const playOnce = () => {
        vid.play();
        document.removeEventListener('click', playOnce);
        document.removeEventListener('touchstart', playOnce);
      };
      document.addEventListener('click', playOnce);
      document.addEventListener('touchstart', playOnce);
    });

    // block right-click & long press on video
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    vid.addEventListener('contextmenu', (e) => e.preventDefault());
    document.addEventListener('touchstart', (e) => {
      if (e.target.tagName === 'VIDEO') e.preventDefault();
    }, { passive: false });

    // ---------- KISS (lip mark) SPAWNER – pure lip prints, no emojis! ----------
    // ultra‑detailed SVG lip – realistic shape with gradients and shine
    const lipSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 70" width="VAR_SIZE" height="VAR_HALF">
      <defs>
        <radialGradient id="kissGrad" cx="40%" cy="40%" r="70%">
          <stop offset="0%" stop-color="LIP_COLOR1"/>
          <stop offset="80%" stop-color="LIP_COLOR2"/>
        </radialGradient>
        <filter id="soften" x="-0.05" y="-0.05" width="1.1" height="1.1">
          <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <!-- upper lip (cupid's bow) -->
      <path d="M15,28 Q28,8 45,18 Q60,27 65,22 Q70,27 85,18 Q102,8 115,28 Q102,16 85,25 Q70,34 65,30 Q60,34 45,25 Q28,16 15,28Z" fill="url(#kissGrad)" opacity="0.96" filter="url(#soften)"/>
      <!-- lower lip (fuller) -->
      <path d="M15,28 Q30,58 65,52 Q100,58 115,28 Q100,48 65,44 Q30,48 15,28Z" fill="url(#kissGrad)" opacity="0.96" filter="url(#soften)"/>
      <!-- highlights to give wet look -->
      <ellipse cx="42" cy="38" rx="12" ry="5" fill="white" opacity="0.22"/>
      <ellipse cx="88" cy="38" rx="10" ry="4" fill="white" opacity="0.18"/>
      <!-- subtle extra shine on lower lip -->
      <path d="M38,46 Q50,50 62,48 Q74,50 88,44" stroke="white" stroke-width="1.5" fill="none" opacity="0.18" stroke-linecap="round"/>
    </svg>`;

    // random color palette – deep kiss shades
    const lipColors = [
      ['#ff3b6f', '#c2185b'],
      ['#ff6b9d', '#b0005a'],
      ['#ff4d7a', '#9e1e5f'],
      ['#ff2e63', '#880e4f'],
      ['#ff80ab', '#c51162'],
      ['#f06292', '#ad1457']
    ];

    function spawnKiss() {
      const el = document.createElement('div');
      el.classList.add('kiss');

      const size  = 70 + Math.random() * 90;        // 70px – 160px wide
      const rot   = (Math.random() * 50 - 25) + 'deg'; // -25° to 25°
      const x     = Math.random() * (window.innerWidth - size);
      const y     = Math.random() * (window.innerHeight - size * 0.6); // avoid bottom cut
      const colorPair = lipColors[Math.floor(Math.random() * lipColors.length)];

      // custom properties for animation
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.width = size + 'px';
      el.style.setProperty('--rot', rot);
      el.style.filter = `drop-shadow(0 0 10px ${colorPair[0]}88)`;

      // inject SVG with correct size & colors
      const svg = lipSVG
        .replace('VAR_SIZE', size)
        .replace('VAR_HALF', size * 0.55)   // keep proportion
        .replace('LIP_COLOR1', colorPair[0])
        .replace('LIP_COLOR2', colorPair[1]);

      el.innerHTML = svg;
      document.body.appendChild(el);

      // remove after animation ends (cleanup)
      el.addEventListener('animationend', () => el.remove());
    }

    // ---- continuous random loop ----
    function startKissRain() {
      spawnKiss();
      // random interval between 400ms and 1300ms — feels organic
      setTimeout(startKissRain, 400 + Math.random() * 900);
    }

    // spawn a few kisses instantly so screen isn't empty
    for (let i = 0; i < 8; i++) {
      setTimeout(spawnKiss, i * 150);
    }

    // launch the infinite kiss loop
    startKissRain();

    // also spawn extra on mouse move occasionally? but better keep random.
    // optionally we can add a burst on click – but not needed, loop is enough

    // for extra fun: on mouse click, spawn 2–3 extra kisses near click (but not necessary)
    document.addEventListener('click', (e) => {
      for (let i = 0; i < 2 + Math.floor(Math.random() * 2); i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.classList.add('kiss');
          const size = 60 + Math.random() * 70;
          const rot = (Math.random() * 40 - 20) + 'deg';
          const x = e.clientX - size/2 + (Math.random()*60 - 30);
          const y = e.clientY - size/2 + (Math.random()*60 - 30);
          const colorPair = lipColors[Math.floor(Math.random() * lipColors.length)];
          el.style.left = x + 'px';
          el.style.top = y + 'px';
          el.style.width = size + 'px';
          el.style.setProperty('--rot', rot);
          el.style.filter = `drop-shadow(0 0 10px ${colorPair[0]}aa)`;
          const svg = lipSVG
            .replace('VAR_SIZE', size)
            .replace('VAR_HALF', size * 0.55)
            .replace('LIP_COLOR1', colorPair[0])
            .replace('LIP_COLOR2', colorPair[1]);
          el.innerHTML = svg;
          document.body.appendChild(el);
          el.addEventListener('animationend', () => el.remove());
        }, i * 60);
      }
    });

    // ensure kisses stay within bounds on resize (optional, but they reposition automatically)
    // no need to reposition existing ones, they'll vanish quickly.
  })();
</script>
</body>
</html>
