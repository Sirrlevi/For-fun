<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>chud bklodi · CHUDOGI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      width: 100vw;
      background: radial-gradient(circle at 30% 20%, #1a0d1a, #0f0015 40%, #000 70%);
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      color: #fff;
      cursor: none;
    }

    /* custom cursor – stays subtle */
    .cursor {
      position: fixed;
      width: 28px;
      height: 28px;
      border: 2px solid #ff2e63;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: all 0.08s ease-out;
      mix-blend-mode: difference;
    }

    .cursor-follower {
      position: fixed;
      width: 12px;
      height: 12px;
      background: #ff2e63;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: all 0.12s ease-out;
      box-shadow: 0 0 15px #ff2e63aa;
    }

    .container {
      position: relative;
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* main text – big & bold */
    .main-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 14vw, 22rem);
      font-weight: 900;
      color: transparent;
      background: linear-gradient(90deg, #ff2e63, #ff6b9d, #ff2e63, #c71585);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      animation: gradientFlow 5s ease infinite, pulseText 2.4s ease-in-out infinite alternate;
      text-shadow: 0 0 60px rgba(255,46,99,0.7);
      letter-spacing: -0.04em;
      z-index: 10;
      user-select: none;
      white-space: nowrap;
      max-width: 100vw;
      overflow: hidden;
      text-overflow: clip;
      padding: 0 2vw;
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes pulseText {
      from { transform: scale(1); }
      to   { transform: scale(1.04); }
    }

    /* ---------- KISS (custom PNG) animation – slow & realistic ---------- */
    .kiss {
      position: fixed;
      pointer-events: none;
      user-select: none;
      z-index: 6;
      transform-origin: center center;
      animation: kissFloat 3.6s ease-out forwards;  /* slower, more graceful */
      filter: drop-shadow(0 0 15px rgba(255, 70, 120, 0.8));
    }

    .kiss img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      transform: rotate(var(--rot));
      /* slight blur at edges for softness? optional */
      filter: blur(0.3px); /* micro blur for realism, barely noticeable */
    }

    @keyframes kissFloat {
      0% {
        opacity: 0;
        transform: scale(0.2) translateY(0);
      }
      12% {
        opacity: 1;
        transform: scale(1.1) translateY(-8px); /* slight lift */
      }
      30% {
        opacity: 0.95;
        transform: scale(1) translateY(0);
      }
      80% {
        opacity: 0.6;
        transform: scale(0.95) translateY(0);
      }
      100% {
        opacity: 0;
        transform: scale(0.7) translateY(30px); /* drift down & fade */
      }
    }

    /* glowing rings in background */
    .glow-ring {
      position: absolute;
      width: min(600px, 80vw);
      height: min(600px, 80vw);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,46,99,0.12) 0%, transparent 70%);
      pointer-events: none;
      animation: breathe 14s ease-in-out infinite;
      z-index: 3;
    }

    @keyframes breathe {
      0%,100% { transform: scale(0.8); opacity: 0.4; }
      50%     { transform: scale(1.4); opacity: 0.7; }
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 30%, transparent 30%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
      z-index: 8;
    }

    /* background video – very faint dreamy layer */
    .bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100vw;
      min-height: 100vh;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
      opacity: 0.15;
      z-index: 1;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .video-tint {
      position: fixed;
      inset: 0;
      background: rgba(10, 0, 20, 0.6);
      z-index: 2;
      pointer-events: none;
    }
  </style>
</head>
<body>

<!-- background video (moody) -->
<video class="bg-video" id="bgVid" muted loop playsinline disablePictureInPicture controlsList="nodownload nofullscreen noremoteplayback">
  <source src="https://files.catbox.moe/ntaibt.mp4" type="video/mp4">
</video>
<div class="video-tint"></div>

<!-- custom cursor -->
<div class="cursor"></div>
<div class="cursor-follower"></div>

<div class="container">
  <div class="glow-ring" style="top:30%; left:60%;"></div>
  <div class="glow-ring" style="top:65%; left:25%; animation-delay: -7s;"></div>

  <h1 class="main-text">CHUDOGI</h1>

  <div class="overlay"></div>
</div>

<script>
  (function() {
    // ---------- CURSOR ----------
    const cursor = document.querySelector('.cursor');
    const follower = document.querySelector('.cursor-follower');

    document.addEventListener('mousemove', (e) => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';

      setTimeout(() => {
        follower.style.left = e.clientX + 'px';
        follower.style.top = e.clientY + 'px';
      }, 40);
    });

    document.addEventListener('mousedown', () => {
      cursor.style.transform = 'translate(-50%,-50%) scale(1.8)';
    });
    document.addEventListener('mouseup', () => {
      cursor.style.transform = 'translate(-50%,-50%) scale(1)';
    });

    // ---------- VIDEO AUTOPLAY ----------
    const vid = document.getElementById('bgVid');
    vid.play().catch(() => {
      const playOnce = () => {
        vid.play();
        document.removeEventListener('click', playOnce);
        document.removeEventListener('touchstart', playOnce);
      };
      document.addEventListener('click', playOnce);
      document.addEventListener('touchstart', playOnce);
    });

    // block right-click & long press on video
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    vid.addEventListener('contextmenu', (e) => e.preventDefault());
    document.addEventListener('touchstart', (e) => {
      if (e.target.tagName === 'VIDEO') e.preventDefault();
    }, { passive: false });

    // ---------- KISS SPAWNER – custom PNG, slow & realistic ----------
    const KISS_IMAGE = 'https://files.catbox.moe/cfzwte.png';  // the given kiss mark

    function spawnKiss() {
      const el = document.createElement('div');
      el.classList.add('kiss');

      // random size between 60px and 160px – keeps variety
      const size = 60 + Math.random() * 100;   // 60–160px
      // random rotation between -30deg and 30deg
      const rot = (Math.random() * 60 - 30) + 'deg';
      // random position, ensuring it stays fully inside viewport
      const x = Math.random() * (window.innerWidth - size);
      const y = Math.random() * (window.innerHeight - size * 0.8); // avoid bottom/top edges

      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.width = size + 'px';
      el.style.setProperty('--rot', rot);

      // create image with the custom PNG
      const img = document.createElement('img');
      img.src = KISS_IMAGE;
      img.alt = '💋';
      img.style.transform = `rotate(${rot})`;   // apply rotation to image (redundant but safe)
      // if image fails to load, we could use a fallback but we trust the link
      img.onerror = () => {
        // optional: fallback to a simple emoji if PNG fails (rare)
        img.style.display = 'none';
        // could also show a text fallback, but we'll just let it disappear gracefully
      };

      el.appendChild(img);
      document.body.appendChild(el);

      // remove after animation ends
      el.addEventListener('animationend', () => el.remove());
    }

    // ---- slow, continuous loop (no spam) ----
    // interval between 2.2 and 3.8 seconds – kam speed, realistic
    function startKissRain() {
      spawnKiss();
      // longer delay: between 2200ms and 4000ms
      setTimeout(startKissRain, 2200 + Math.random() * 1800);
    }

    // spawn a few kisses immediately so the screen isn't empty
    for (let i = 0; i < 5; i++) {
      setTimeout(spawnKiss, i * 400); // staggered start
    }

    startKissRain();

    // ❌ NO click/tap spawn – exactly as requested: no extra spam on tap
    // (all event listeners for click removed)

  })();
</script>
</body>
</html>
