<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CHUDOGI 😈🍆💦</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@600;800;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      width: 100vw;
      background: radial-gradient(circle at 30% 20%, #1a000f, #0f0015 30%, #000 65%);
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      color: #fff;
      cursor: none;
    }

    /* Custom cursor - more naughty */
    .cursor {
      position: fixed;
      width: 36px;
      height: 36px;
      border: 3px solid #ff1744;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: all 0.06s ease-out;
      mix-blend-mode: difference;
      box-shadow: 0 0 25px #ff1744aa;
    }

    .cursor-follower {
      position: fixed;
      width: 18px;
      height: 18px;
      background: #ff1744;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: all 0.09s ease-out;
      box-shadow: 0 0 30px #ff1744, inset 0 0 12px #fff3;
    }

    .container {
      position: relative;
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .main-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(4rem, 16vw, 26rem);
      font-weight: 900;
      color: transparent;
      background: linear-gradient(90deg, #ff1744, #f50057, #d500f9, #ff1744, #f50057);
      background-size: 400% 400%;
      -webkit-background-clip: text;
      background-clip: text;
      animation: gradientFlow 4s ease infinite, pulseText 1.8s ease-in-out infinite alternate, dripGlow 6s ease-in-out infinite;
      text-shadow: 0 0 80px rgba(255,23,68,0.9), 0 0 140px rgba(213,0,249,0.6);
      letter-spacing: -0.06em;
      z-index: 10;
      user-select: none;
      white-space: nowrap;
      max-width: 100vw;
      overflow: hidden;
      text-overflow: clip;
      padding: 0 3vw;
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes pulseText {
      from { transform: scale(1); }
      to   { transform: scale(1.06); }
    }

    @keyframes dripGlow {
      0%,100% { filter: brightness(1) drop-shadow(0 0 40px #ff1744); }
      50%     { filter: brightness(1.4) drop-shadow(0 0 90px #f50057); }
    }

    .sticker {
      position: absolute;
      font-size: clamp(2.8rem, 8vw, 6rem);
      opacity: 0.22;
      pointer-events: none;
      user-select: none;
      animation: float 14s infinite ease-in-out, rotateSlow 32s linear infinite;
      z-index: 5;
      text-shadow: 0 0 20px currentColor;
    }

    .sticker.fast {
      animation-duration: 9s, 20s;
      opacity: 0.35;
    }

    .sticker.intense {
      animation-duration: 7s, 16s;
      opacity: 0.5;
      filter: drop-shadow(0 0 15px currentColor);
    }

    .sticker:nth-child(odd)  { color: #ff1744; }
    .sticker:nth-child(even) { color: #f50057; }
    .sticker:nth-child(3n)   { color: #d500f9; }

    @keyframes float {
      0%,100% { transform: translateY(0) rotate(0deg) scale(1); }
      25%     { transform: translateY(-110px) rotate(12deg) scale(1.1); }
      50%     { transform: translateY(0) rotate(0deg) scale(1); }
      75%     { transform: translateY(110px) rotate(-15deg) scale(1.1); }
    }

    @keyframes rotateSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .glow-ring {
      position: absolute;
      width: min(700px, 85vw);
      height: min(700px, 85vw);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,23,68,0.18) 0%, rgba(213,0,249,0.12) 40%, transparent 70%);
      pointer-events: none;
      animation: breathe 11s ease-in-out infinite;
      z-index: 3;
    }

    .glow-ring:nth-child(2) { animation-delay: -5.5s; }

    @keyframes breathe {
      0%,100% { transform: scale(0.7); opacity: 0.35; }
      50%     { transform: scale(1.6); opacity: 0.85; }
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 25%, transparent 20%, rgba(0,0,0,0.75) 100%);
      pointer-events: none;
      z-index: 8;
    }
  </style>
</head>
<body>

<div class="cursor"></div>
<div class="cursor-follower"></div>

<div class="container">
  <div class="glow-ring" style="top:28%; left:65%;"></div>
  <div class="glow-ring" style="top:68%; left:22%;"></div>

  <h1 class="main-text">CHUDOGI</h1>

  <div class="overlay"></div>

  <!-- Much hornier stickers -->
  <div class="sticker" style="top:12%; left:6%;">🥵</div>
  <div class="sticker fast" style="top:18%; right:10%;">🍆</div>
  <div class="sticker intense" style="bottom:15%; left:14%;">🍑</div>
  <div class="sticker fast" style="bottom:22%; right:12%;">💦</div>
  <div class="sticker" style="top:35%; left:4%;">👅</div>
  <div class="sticker intense" style="top:52%; right:6%;">😈</div>
  <div class="sticker fast" style="bottom:10%; left:18%;">🤤</div>
  <div class="sticker" style="top:6%; right:16%; animation-delay:4s;">🍆💦</div>
  <div class="sticker intense" style="bottom:32%; left:8%;">🍑👅</div>
  <div class="sticker fast" style="top:45%; right:18%;">🥴</div>
  <div class="sticker" style="top:25%; left:22%; animation-delay:7s;">🔥💦</div>
  <div class="sticker intense" style="bottom:40%; right:10%;">😏🍆</div>
</div>

<script>
  const cursor = document.querySelector('.cursor');
  const follower = document.querySelector('.cursor-follower');

  document.addEventListener('mousemove', (e) => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';

    setTimeout(() => {
      follower.style.left = e.clientX + 'px';
      follower.style.top  = e.clientY + 'px';
    }, 50);
  });

  document.addEventListener('mousedown', () => {
    cursor.style.transform = 'translate(-50%,-50%) scale(2.2)';
    cursor.style.borderColor = '#d500f9';
    follower.style.background = '#d500f9';
  });

  document.addEventListener('mouseup', () => {
    cursor.style.transform = 'translate(-50%,-50%) scale(1)';
    cursor.style.borderColor = '#ff1744';
    follower.style.background = '#ff1744';
  });
</script>

</body>
</html>
